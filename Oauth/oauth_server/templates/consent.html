<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>授权 - OAuth Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-lg">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">授权请求</h1>
        <p class="text-center text-gray-500 mb-8 text-sm break-all">{{ client_name }}</p>

        <div class="bg-gray-50 rounded-lg p-5 mb-8">
            <p class="text-gray-700 leading-relaxed">
                应用 <strong class="text-indigo-700">{{ client_name }}</strong>
                <span class="text-gray-400 text-xs">({{ client_id }})</span>
                请求以下权限：
            </p>
            <ul class="mt-3 space-y-1.5">
                {% for s in scope.split() %}
                <li class="flex items-center gap-2 text-sm text-gray-600">
                    <svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    {{ s }}
                </li>
                {% else %}
                <li class="text-sm text-gray-500">仅基础访问权限</li>
                {% endfor %}
            </ul>
        </div>

        <div class="flex gap-4">
            <form method="post" action="/oauth/authorize" class="flex-1">
                <input type="hidden" name="action" value="approve">
                <input type="hidden" name="client_id" value="{{ client_id }}">
                <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
                <input type="hidden" name="scope" value="{{ scope }}">
                <input type="hidden" name="state" value="{{ state }}">
                <button type="submit"
                        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
                    授权
                </button>
            </form>

            <form method="post" action="/oauth/authorize" class="flex-1">
                <input type="hidden" name="action" value="deny">
                <input type="hidden" name="client_id" value="{{ client_id }}">
                <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
                <input type="hidden" name="scope" value="{{ scope }}">
                <input type="hidden" name="state" value="{{ state }}">
                <button type="submit"
                        class="w-full bg-gray-200 text-gray-700 py-2.5 rounded-lg font-medium hover:bg-gray-300 transition">
                    拒绝
                </button>
            </form>
        </div>
    </div>
</body>
</html>
